name: Download build artifact from S3
description: Download and extract build artifacts from deployment delivery pipeline S3 bucket

inputs:
  github-repository-name:
    description: "GitHub repository name"
    required: true
  working-directory:
    description: "Working directory within the repository (if applicable)"
    required: false
    default: ""
  git-sha:
    required: true
    description: "Git SHA to download"
  artifact-path:
    description: "Path within the zip file where the build artifacts are located (optional). If not specified, extracts entire zip."
    required: false
    default: ""
  output-directory:
    description: "Directory where the extracted artifacts will be placed"
    required: false
    default: "./dist"
  version-handler-api-endpoint:
    description: "Version handler API endpoint. Defaults to production endpoint."
    required: false
    default: "https://version-handler.vydeployment.vydev.io"

outputs:
  artifact-directory:
    description: "Directory containing the extracted build artifacts"
    value: ${{ inputs.output-directory }}

runs:
  using: composite
  steps:
    - name: Get artifact location from version handler
      id: find-artifact-location
      uses: nsbno/platform-actions/.github/actions/helpers/make-aws-api-call@v2
      with:
        http-method: GET
        endpoint: ${{ inputs.version-handler-api-endpoint }}/v2/versions/${{ inputs.github-repository-name }}/lambda?working_directory=${{ inputs.working-directory }}
        continue-on-error: false

    - name: Download and unzip artifact from S3
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.artifact-path }}
        OUTPUT_DIRECTORY: ${{ inputs.output-directory }}
        VERSION_RESPONSE: ${{ steps.find-artifact-location.outputs.response }}
        REQUESTED_GIT_SHA: ${{ inputs.git-sha }}
        GITHUB_REPO_NAME: ${{ inputs.github-repository-name }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        # Extract bucket name from version-handler response (for service account discovery)
        SERVICE_BUCKET_NAME=$(echo "$VERSION_RESPONSE" | jq -r '.bucket_name')

        if [ -z "$SERVICE_BUCKET_NAME" ] || [ "$SERVICE_BUCKET_NAME" = "null" ]; then
          echo "::error::Failed to get bucket_name from version-handler API."
          exit 1
        fi

        # Construct S3 path using the REQUESTED git-sha (not the "latest" from version-handler)
        if [ -n "$WORKING_DIR" ] && [ "$WORKING_DIR" != "." ]; then
          S3_OBJECT_PATH="${GITHUB_REPO_NAME}/${WORKING_DIR}/${REQUESTED_GIT_SHA}.zip"
        else
          S3_OBJECT_PATH="${GITHUB_REPO_NAME}/${REQUESTED_GIT_SHA}.zip"
        fi

        echo "Downloading artifact: git_sha=$REQUESTED_GIT_SHA"
        echo "From: s3://${SERVICE_BUCKET_NAME}/${S3_OBJECT_PATH}"
        aws s3 cp "s3://${SERVICE_BUCKET_NAME}/${S3_OBJECT_PATH}" ./build.zip

        # Handle artifact-path extraction
        if [ -n "$ARTIFACT_PATH" ]; then
          # Extract specific subdirectory from zip
          mkdir -p ./temp-unzipped
          unzip -q build.zip -d ./temp-unzipped

          if [ -d "./temp-unzipped/${ARTIFACT_PATH}" ]; then
            echo "Extracting artifact path: ${ARTIFACT_PATH}"
            mkdir -p "${OUTPUT_DIRECTORY}"
            mv ./temp-unzipped/${ARTIFACT_PATH}/* "${OUTPUT_DIRECTORY}"/
            rm -rf ./temp-unzipped
          else
            echo "::error::Could not find artifact path '${ARTIFACT_PATH}' in unzipped content"
            echo "Available paths:"
            ls -la ./temp-unzipped/
            exit 1
          fi
        else
          # Extract entire content
          mkdir -p "${OUTPUT_DIRECTORY}"
          unzip -q build.zip -d "${OUTPUT_DIRECTORY}"
        fi

        echo "Build artifact ready in ${OUTPUT_DIRECTORY}"
