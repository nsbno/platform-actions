name: Detect application changes
description: Detect changes in application files

outputs:
  any-changed:
    description: 'Whether any application files have changed.'
    value: ${{ steps.changed-application-files.outputs.any_changed }}

runs:
  using: 'composite'
  steps:
    - name: Get all changed application files
      id: changed-application-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
      with:
        since_last_remote_commit: true
        files: |
          **/*.java
          **/*.kt
          **/*.kts
          gradle.properties
          gradlew
          gradlew.bat
          settings.gradle.kts
          
          **/*.js
          **/*.ts
          **/*.jsx
          **/*.tsx
          package.json
          package-lock.json
          vite-env.d.ts
          vite.config.ts
          tsconfig.json
          
          **/*.py
          pyproject.toml
          poetry.lock
          requirements.txt

    - name: List all changed files
      id: list-changed-files
      shell: bash
      if: steps.changed-application-files.outputs.any_changed == 'true'
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-application-files.outputs.all_changed_files }}
      run: |
        for file in ${ALL_CHANGED_FILES}; do
          echo "$file was changed"
        done
