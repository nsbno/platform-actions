name: Deploy Preview (ECS Express)
description: Deploy preview environment to ECS Express mode

inputs:
  service-name:
    description: "The name of the ECS service service to deploy"
    required: true
  ecr-image-base:
    description: "The base ECR image URI to use for the service"
    required: true
  git-sha:
    description: "The Git SHA to use for versioning the service"
    required: true
  service-port:
    description: "The port the service is running on, default is 3000"
    required: true
    default: '3000'
  health-endpoint:
    description: "Endpoint where to run health checks against"
    required: false
    default: '/'
  aws-account-id:
    description: "The AWS account ID the preview environment will use"
    required: true
  git-event-number:
    description: "The GitHub event number (PR number) to use in the service name"
    required: true
  aws-region:
    description: "The AWS region to deploy the service in"
    required: false
    default: 'eu-west-1'
  custom-env-variables:
    description: 'Custom environment variables as JSON object, e.g. {"NAME":"VALUE"}'
    required: false
    default: '{}'

outputs:
  service-ingress-url:
    description: "The direct URL to the service"
    value: ${{ steps.wait-for-service.outputs.service_url }}

runs:
  using: composite
  steps:
    - name: Set service variables
      shell: bash
      id: set-service-variables
      run: |
        echo "service_name=pr-${{ inputs.git-event-number }}-${{ inputs.service-name }}" >> $GITHUB_OUTPUT
        echo "image_uri=${{ inputs.ecr-image-base }}:${{ inputs.git-sha }}" >> $GITHUB_OUTPUT
        echo "execution_role_arn=arn:aws:iam::${{ inputs.aws-account-id }}:role/${{inputs.service-name}}-preview-ecs-execution" >> $GITHUB_OUTPUT
        echo "infrastructure_role_arn=arn:aws:iam::${{ inputs.aws-account-id }}:role/${{inputs.service-name}}-preview-ecs-infrastructure" >> $GITHUB_OUTPUT

    - name: Check if Service exists
      id: check-service
      shell: bash
      run: |
        SERVICE_NAME="${{ steps.set-service-variables.outputs.service_name }}"
        SERVICE_ARN="arn:aws:ecs:${{ inputs.aws-region }}:${{ inputs.aws-account-id }}:service/default/${SERVICE_NAME}"

        set +e
        DESCRIBE_OUTPUT=$(aws ecs describe-express-gateway-service \
          --service-arn "$SERVICE_ARN" \
          --region "${{ inputs.aws-region }}" 2>&1)
        DESCRIBE_EXIT=$?
        set -e

        if [ $DESCRIBE_EXIT -eq 0 ]; then
          echo "Service $SERVICE_NAME already exists with ARN: $SERVICE_ARN"
          echo "service_exists=true" >> $GITHUB_OUTPUT
          echo "service_arn=$SERVICE_ARN" >> $GITHUB_OUTPUT
        elif echo "$DESCRIBE_OUTPUT" | grep -q -i "ServiceNotFoundException\|not found"; then
          echo "Service $SERVICE_NAME does not exist. Will create a new one."
          echo "service_exists=false" >> $GITHUB_OUTPUT
        else
          echo "Failed to describe service: $DESCRIBE_OUTPUT"
          exit 1
        fi

    - name: Prepare Environment Variables Configuration
      id: prepare-env-vars
      shell: bash
      env:
        CUSTOM_ENV_VARS: ${{ inputs.custom-env-variables }}
      run: |
        ENV_VARS_JSON="{}"
        AUTH_URL_JSON="{}"

        # Path is expected to include `env_vars` or `secrets` after `service_name`
        PARAMS_FILE=$(mktemp)
        aws ssm get-parameters-by-path --path "/__${{ inputs.service-name }}__/" --recursive --query "Parameters" --output json > "$PARAMS_FILE"

        if [ -s "$PARAMS_FILE" ] && [ "$(cat "$PARAMS_FILE")" != "[]" ]; then
          # Process each parameter
          ENV_VARS_JSON="{"
          FIRST=true

          while IFS= read -r ROW; do
            # Extract last part of the path
            FULL_PATH=$(echo "$ROW" | jq -r '.Name')
            NAME=$(basename "$FULL_PATH")

            if [[ "$NAME" == "AUTH_URL" ]]; then
              ENV_VAR_VALUE=$(echo "$ROW" | jq -r '.Value')
              PR_PREFIX="pr-${{ inputs.git-event-number }}."

              # Insert PR prefix right after https:// and before the first dot in the hostname
              AUTH_URL=$(echo "$ENV_VAR_VALUE" | sed -E "s#^(https://)([^./]+)#\1${PR_PREFIX}\2#")

              AUTH_URL_JSON="{\"AUTH_URL\":$(echo "$AUTH_URL" | jq -R .)}"
              continue
            else
              VALUE=$(echo "$ROW" | jq -r '.ARN')
            fi

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              ENV_VARS_JSON="$ENV_VARS_JSON,"
            fi

            # Properly escape the value for JSON
            ESCAPED_VALUE=$(echo "$VALUE" | jq -R .)
            ENV_VARS_JSON="$ENV_VARS_JSON\"$NAME\":$ESCAPED_VALUE"
          done < <(jq -c '.[]' "$PARAMS_FILE")

          ENV_VARS_JSON="$ENV_VARS_JSON}"
        fi

        rm -f "$PARAMS_FILE"

        # Merge AUTH_URL_JSON with custom environment variables
        # Custom env vars take precedence if there are conflicts
        PLAINTEXT_ENV_VARS=$(echo "$AUTH_URL_JSON" | jq -c --argjson custom "$CUSTOM_ENV_VARS" '. + $custom')

        echo "env_vars_config=$ENV_VARS_JSON" >> $GITHUB_OUTPUT
        echo "plaintext_env_vars=$PLAINTEXT_ENV_VARS" >> $GITHUB_OUTPUT

    - name: Deploy to Service
      if: steps.check-service.outputs.service_exists == 'false'
      id: create-service
      shell: bash
      env:
        ENV_VARS_CONFIG: ${{ steps.prepare-env-vars.outputs.env_vars_config }}
        PLAINTEXT_ENV_VARS: ${{ steps.prepare-env-vars.outputs.plaintext_env_vars }}
        HEALTH_CHECK_ENDPOINT: ${{ inputs.health-endpoint }}
      run: |
        secrets="$(jq -c '[to_entries[] | {name: .key, valueFrom: .value}]' <<< "$ENV_VARS_CONFIG")"
        plaintext="$(jq -c '[to_entries[] | {name: .key, value: .value}]' <<< "$PLAINTEXT_ENV_VARS")"
        
        echo "Secrets: $secrets"
        echo "Plaintext: $plaintext"
        
        primary_container="$(jq -n \
          --arg image "${{ steps.set-service-variables.outputs.image_uri }}" \
          --argjson port "${{ inputs.service-port }}" \
          --argjson secrets "$secrets" \
          --argjson plaintext "$plaintext" \
          '{
            image: $image,
            containerPort: $port,
            environment: $plaintext,
            secrets: $secrets
          }')"
          
        echo "$primary_container"
  
        executionRoleArn="${{ steps.set-service-variables.outputs.execution_role_arn }}"
        infrastructureRoleArn="${{ steps.set-service-variables.outputs.infrastructure_role_arn }}"
        echo "Deploying Preview: ${{ steps.set-service-variables.outputs.service_name }} ($executionRoleArn, $infrastructureRoleArn)..."
        
        aws ecs create-express-gateway-service \
          --service-name "${{ steps.set-service-variables.outputs.service_name }}" \
          --execution-role-arn "$executionRoleArn" \
          --infrastructure-role-arn "$infrastructureRoleArn" \
          --primary-container "$primary_container" \
          --health-check-path "$HEALTH_CHECK_ENDPOINT" \
          --region "${{ inputs.aws-region }}"
        
        serviceArn="arn:aws:ecs:${{ inputs.aws-region }}:${{ inputs.aws-account-id }}:service/default/${{ steps.set-service-variables.outputs.service_name }}"
        echo "Deployment started! $serviceArn"
        echo "service_arn=$serviceArn" >> $GITHUB_OUTPUT

    - name: Update existing Service
      if: steps.check-service.outputs.service_exists == 'true'
      id: update-service
      shell: bash
      env:
        ENV_VARS_CONFIG: ${{ steps.prepare-env-vars.outputs.env_vars_config }}
        PLAINTEXT_ENV_VARS: ${{ steps.prepare-env-vars.outputs.plaintext_env_vars }}
        HEALTH_CHECK_ENDPOINT: ${{ inputs.health-endpoint }}
      run: |
        secrets="$(jq -c '[to_entries[] | {name: .key, valueFrom: .value}]' <<< "$ENV_VARS_CONFIG")"
        plaintext="$(jq -c '[to_entries[] | {name: .key, value: .value}]' <<< "$PLAINTEXT_ENV_VARS")"

        primary_container="$(jq -n \
          --arg image "${{ steps.set-service-variables.outputs.image_uri }}" \
          --argjson port "${{ inputs.service-port }}" \
          --argjson secrets "$secrets" \
          --argjson plaintext "$plaintext" \
          '{
            image: $image,
            containerPort: $port,
            environment: $plaintext,
            secrets: $secrets
          }')"

        executionRoleArn="${{ steps.set-service-variables.outputs.execution_role_arn }}"
        SERVICE_ARN="${{ steps.check-service.outputs.service_arn }}"
        echo "Updating Preview: ${{ steps.set-service-variables.outputs.service_name }} ($SERVICE_ARN)..."

        aws ecs update-express-gateway-service \
          --service-arn "$SERVICE_ARN" \
          --execution-role-arn "$executionRoleArn" \
          --primary-container "$primary_container" \
          --health-check-path "$HEALTH_CHECK_ENDPOINT" \
          --region "${{ inputs.aws-region }}"

        echo "Update started! $SERVICE_ARN"
        echo "service_arn=$SERVICE_ARN" >> $GITHUB_OUTPUT

    - name: Wait for Service to be available
      id: wait-for-service
      shell: bash
      run: |
        SERVICE_ARN="${{ steps.create-service.outputs.service_arn || steps.update-service.outputs.service_arn }}"

        for i in {1..60}; do
          SERVICE_JSON=$(aws ecs describe-express-gateway-service --service-arn "$SERVICE_ARN" --region ${{ inputs.aws-region }})
          STATUS=$(echo "$SERVICE_JSON" | jq -r '.service.status.statusCode')
          STATUS_REASON=$(echo "$SERVICE_JSON" | jq -r '.service.status.statusReason // ""')
          echo "Current status: $STATUS ($STATUS_REASON)"
          if [[ "$STATUS" == "ACTIVE" ]]; then
            echo "Service is active."
            break
          fi
          sleep 10
        done

        if [[ "$STATUS" != "ACTIVE" ]]; then
          echo "Service did not reach ACTIVE status."
          exit 1
        fi

        SERVICE_URL=$(echo "$SERVICE_JSON" | jq -r '[.service.activeConfigurations[0].ingressPaths[] | select(.accessType=="PUBLIC") | .endpoint][0] | sub("^https?://"; "") | sub("/$"; "")')
        echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT