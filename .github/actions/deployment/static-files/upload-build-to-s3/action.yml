name: Upload build to S3
description: Upload static build files to S3 with versioning

inputs:
  github-repository-name:
    description: "GitHub repository name"
    required: true
  working-directory:
    description: "Working directory within the repository"
    required: true
  s3-bucket-name:
    description: "Name of the bucket to upload static files to."
    required: true
  git-sha:
    required: true
    description: "Git SHA to use for versioning"
  artifact-path:
    description: "Path within the zip file where the build artifacts are located (optional). If not specified, uses entire zip content."
    required: false
    default: ""
  s3-static-files-path:
    description: "Path in S3 bucket to upload static files to."
    required: false
    default: "static"
  cache-control-config:
    description: "Path to cache-control config file (relative to repository root)"
    required: false
    default: ".static-files-cache.yml"

runs:
  using: composite
  steps:
    - name: Download build artifact
      uses: nsbno/platform-actions/.github/actions/helpers/download-build-artifact@feat/preview-urls-spa
      with:
        github-repository-name: ${{ inputs.github-repository-name }}
        working-directory: ${{ inputs.working-directory }}
        git-sha: ${{ inputs.git-sha }}
        artifact-path: ${{ inputs.artifact-path }}
        output-directory: "./content-to-upload"

    - name: Install Python dependencies
      shell: bash
      run: |
        python3 -m pip install -q boto3 PyYAML

    - name: Upload build files to S3
      shell: bash
      id: upload
      run: |
        python3 ${{ github.action_path }}/upload.py \
          "./content-to-upload" \
          "${{ inputs.s3-bucket-name }}" \
          "${{ inputs.s3-static-files-path }}/${{ inputs.git-sha }}" \
          "${{ inputs.cache-control-config }}"
