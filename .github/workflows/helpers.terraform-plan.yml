name: Run Terraform plan
on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the project files"
        required: false
        type: string
        default: "."
      terraform-directory:
        description: Directory where Terraform environment directories are located
        type: string
        required: false
        default: ""
      skip-service-environment:
        description: '[DEPRECATED] This parameter no longer has any effect. Service environment is automatically skipped if no terraform directory exists.'
        type: boolean
        default: false
        required: false
      git-sha:
        description: The SHA to plan. First try the current head of PR.
        type: string
        required: false
        default: ${{ github.event.pull_request.head.sha || github.sha }}
      environment:
        description: (Optional) If provided, only plan for this environment.
        type: string
        required: false
        default: ""
      version-handler-api-endpoint:
        description: "Version handler API endpoint for artifact versioning. Use ONLY if testing the deployment pipeline"
        required: false
        type: string

jobs:
  get-environments:
    name: Find Relevant GH Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.envs.outputs.environments || steps.single-env.outputs.environments }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: nsbno/platform-actions/.github/actions/helpers/get-environments@v2
        if: ${{ inputs.environment == '' }}
        id: envs
        with:
          working-directory: ${{ inputs.working-directory }}
          terraform-directory: ${{ inputs.terraform-directory }}
      - name: Set single environment
        if: ${{ inputs.environment != '' }}
        id: single-env
        run: |
          echo "environments=[\"${{ inputs.environment }}\"]" >> $GITHUB_OUTPUT

  terraform-plan:
    name: Terraform Plan
    needs: get-environments
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.get-environments.outputs.environments) }}
    # Needed to avoid conflicts with terraform state
    concurrency:
      group: ${{ inputs.working-directory }}-${{ matrix.environment }}-terraform
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: '0' # Fetch all history for all branches and tags (for branch deploys)
          ref: ${{ inputs.git-sha }}

      - name: Run Terraform Plan
        uses: nsbno/platform-actions/.github/actions/helpers/has-terraform-changed@v2
        id: changed-files
        with:
          environment: ${{ matrix.environment }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
          deployment-role: ${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}
          working-directory: ${{ inputs.working-directory }}
          terraform-directory: ${{ inputs.terraform-directory }}
          terraform-options: '-no-color'
          git-sha: ${{ inputs.git-sha }}
          version-handler-api-endpoint: ${{ inputs.version-handler-api-endpoint }}

      - name: Save plan output
        if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'
        shell: bash
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          ANY_CHANGED: ${{ steps.changed-files.outputs.any-changed }}
        run: |
          if [ -n "$WORKING_DIRECTORY" ] && [ "$WORKING_DIRECTORY" != "." ]; then
            WORKING_DIRECTORY_SUFFIX=" in ${WORKING_DIRECTORY}"
          else
            WORKING_DIRECTORY_SUFFIX=""
          fi

          mkdir -p plans

          if [ "$ANY_CHANGED" == "true" ]; then
            PLAN_OUTPUT=$(cat << 'PLANEOF'
          ${{ steps.changed-files.outputs.stdout }}
          PLANEOF
            )

            PLAN_CONTENT=$(echo "$PLAN_OUTPUT" | sed -n '/Terraform used the selected providers/,$p')
            if [ -z "$PLAN_CONTENT" ]; then
              PLAN_CONTENT="$PLAN_OUTPUT"
            fi

            cat << EOF > "plans/${ENVIRONMENT}.md"
          ### Terraform Plan for ${ENVIRONMENT}${WORKING_DIRECTORY_SUFFIX} 🔍

          <details>
          <summary>Show Plan</summary>

          \`\`\`terraform
          $PLAN_CONTENT
          \`\`\`

          </details>
          EOF
          else
            cat << EOF > "plans/${ENVIRONMENT}.md"
          ### Terraform Plan for ${ENVIRONMENT}${WORKING_DIRECTORY_SUFFIX} 🔍

          _No changes detected._
          EOF
          fi

      - name: Upload plan artifact
        if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: plans/${{ matrix.environment }}.md

  publish-plan:
    name: Publish Terraform Plan
    needs: terraform-plan
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && needs.terraform-plan.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all plan artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: terraform-plan-*
          path: plans
          merge-multiple: true

      - name: Post combined PR comment
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          COMMENT_FILE=$(mktemp)

          for plan_file in plans/*.md; do
            [ -f "$plan_file" ] || continue
            cat "$plan_file" >> "$COMMENT_FILE"
            echo "" >> "$COMMENT_FILE"
          done

          if [ ! -s "$COMMENT_FILE" ]; then
            echo "No plan changes to post."
            exit 0
          fi

          cat << EOF >> "$COMMENT_FILE"
          *For commit ${{ inputs.git-sha }}*
          *Plan generated at: $(date -u "+%Y-%m-%d %H:%M:%S UTC")*
          EOF

          gh pr comment $PR_NUMBER --body-file "$COMMENT_FILE"

          rm "$COMMENT_FILE"