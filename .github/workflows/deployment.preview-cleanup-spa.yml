name: Cleanup SPA Preview
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name used for preview infrastructure. Must match the 'service_name' parameter in your terraform-aws-preview-url-spa module (https://github.com/nsbno/terraform-aws-preview-url-spa)"
      pr-number:
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}"

      - name: Get preview bucket name
        id: get-config
        run: |
          PREVIEW_BUCKET=$(aws ssm get-parameter \
            --name "/__deployment__/applications/${{ inputs.service-name }}/preview-bucket-name" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          if [ -z "$PREVIEW_BUCKET" ] || [ "$PREVIEW_BUCKET" = "None" ]; then
            echo "::warning::Could not find preview bucket name in SSM. Preview infrastructure may not be deployed yet."
            echo "preview-bucket=" >> $GITHUB_OUTPUT
          else
            echo "preview-bucket=${PREVIEW_BUCKET}" >> $GITHUB_OUTPUT
            echo "Found preview bucket: ${PREVIEW_BUCKET}"
          fi

      - name: Delete preview files
        if: steps.get-config.outputs.preview-bucket != ''
        run: |
          echo "Deleting s3://${{ steps.get-config.outputs.preview-bucket }}/pr-${{ inputs.pr-number }}/"
          aws s3 rm "s3://${{ steps.get-config.outputs.preview-bucket }}/pr-${{ inputs.pr-number }}/" --recursive
          echo "Preview files deleted successfully"

      - name: Comment on PR
        if: steps.get-config.outputs.preview-bucket != ''
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/issues/${{ inputs.pr-number }}/comments" \
            -f body="✅ Preview deployment cleaned up."
        env:
          GH_TOKEN: ${{ github.token }}
