on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        description: "Directory containing the project files."
        default: ""
      artifact-name:
        required: false
        type: string
        description: "Name of the artifact storing the build files."
      artifact-path:
        required: false
        type: string
        description: "Path where files should be zipped from"
        default: ""
      zip-file-name:
        required: false
        type: string
        description: "Name of the zip file to upload."
        default: ""
      s3-path:
        required: false
        type: string
        description: "Subdirectory under the repository name (and working-directory, if set) in S3. Use this when multiple artifacts are uploaded from the same working directory. Then you can reference it as `path` in `vy_lambda_artifact` or `vy_frontend_artifact` in Terraform."
        default: ""
      s3-bucket-name:
        required: false
        type: string
        description: "Name of the S3 bucket to upload to."
        default: ""
      aws-region:
        required: false
        type: string
        description: "AWS region to use."
        default: 'eu-west-1'

name: Package artifact to S3

permissions:
  id-token: write
  contents: read

jobs:
  upload-zip-to-s3:
    name: Upload zip to S3
    environment: Service
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts if specified
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: "./temp-artifact"

      - name: Create zip file if not specified
        if: inputs.zip-file-name == ''
        run: |
          ZIP_FILE="$(pwd)/artifact.zip"

          if [ -d "./temp-artifact" ]; then
            # Navigate to artifact directory (with optional subdirectory)
            if [ -n "${{ inputs.artifact-path }}" ]; then
              cd "./temp-artifact/${{ inputs.artifact-path }}"
            else
              cd "./temp-artifact"
            fi
          fi

          zip -r "$ZIP_FILE" ./*

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}"

      - name: Upload to S3
        env:
          S3_BUCKET: ${{ inputs.s3-bucket-name != '' && inputs.s3-bucket-name || format('{0}-deployment-delivery-pipeline-artifacts', vars.AWS_ACCOUNT_ID) }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          SERVICE_DIR: ${{ inputs.working-directory }}
          S3_PATH: ${{ inputs.s3-path }}
          REPO_NAME: ${{ github.repository }}
          ZIP_FILE_NAME: ${{ inputs.zip-file-name != '' && inputs.zip-file-name || format('{0}.zip', 'artifact') }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          REPO_NAME_WITHOUT_OWNER="${REPO_NAME##*/}"
          S3_URI="s3://$S3_BUCKET/$REPO_NAME_WITHOUT_OWNER"
          if [ "$SERVICE_DIR" != "" ]; then
            S3_URI="$S3_URI/$SERVICE_DIR"
          fi
          if [ "$S3_PATH" != "" ]; then
            S3_URI="$S3_URI/$S3_PATH"
          fi
          S3_URI="$S3_URI/$GIT_SHA.zip"

          aws s3 cp "./$ZIP_FILE_NAME" "${S3_URI}" --metadata "tags"="'[\"${GIT_SHA}-SHA\",\"${BRANCH}-branch\"]'"
