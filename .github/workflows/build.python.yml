name: Build Python project

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        description: "What Python version to use."
        default: "3.13"
      working-directory:
        required: false
        type: string
        default: "."
      artifact-name:
        required: false
        type: string
        default: "python-artifact"
      git-sha:
        required: false
        type: string
        default: ${{ github.event.pull_request.head.sha || github.sha }}
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"

    outputs:
      artifact-name:
        description: The name of the artifact generated by the build
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build Python
    runs-on: ${{ inputs.runs-on }}
    outputs:
      artifact-name: ${{ steps.artifact-name.outputs.artifact-name }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0' # Fetch all history for all branches and tags (for branches)
          ref: ${{ inputs.git-sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "${{ inputs.working-directory }}/uv.lock"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          uv build
          uv pip install dist/*.whl --target ./out
          find ./out/ -name "__pycache__" -type d -exec rm -rf {} \;

      - name: Validate and build artifact name
        id: artifact-name
        run: |
          NAME="$INPUT_NAME"
          NAME="$(echo "$NAME" | xargs)"

          if [ -z "$NAME" ]; then
            echo "Error: artifact-name cannot be empty or whitespace"
            exit 1
          fi

          ARTIFACT_NAME="${{ inputs.working-directory }}-$NAME"
          ARTIFACT_NAME="${ARTIFACT_NAME//\//-}"

          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
        env:
          INPUT_NAME: ${{ inputs.artifact-name }}

      - name: Store build as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-name.outputs.artifact-name }}
          path: ${{ inputs.working-directory }}/out
          retention-days: 5