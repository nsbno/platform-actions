name: Deploy SPA Preview
on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "Artifact name from build job"
      service-name:
        required: true
        type: string
        description: "Service name (must match Terraform module)"
      git-sha:
        required: false
        type: string
        default: ${{ github.event.pull_request.head.sha || github.sha }}
      git-event-number:
        required: false
        type: string
        default: ${{ github.event.pull_request.number || github.event.issue.number || github.event.number }}
      git-repository:
        required: false
        type: string
        default: ${{ github.repository }}
      only-on-preview-comment:
        required: false
        type: boolean
        default: true
        description: "Whether to check for a .preview comment before deploying"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy SPA Preview
    runs-on: ubuntu-latest
    environment: Test
    outputs:
      deployment-successful: ${{ steps.upload-spa.conclusion == 'success' }}
    steps:
      - name: Check for .preview comments
        if: inputs.only-on-preview-comment
        id: check-comments
        run: |
          PR_NUMBER=${{ inputs.git-event-number }}

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "PR number is not available in this context. Skipping deployment."
            echo "continue=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMENTS=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments --paginate)

          if echo "$COMMENTS" | jq -e '.[] | select(.body | startswith(".preview"))' > /dev/null; then
            echo "Found a .preview comment in PR #$PR_NUMBER, continuing..."
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "No .preview comment found in PR #$PR_NUMBER, skipping deployment."
            echo "continue=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate with AWS
        if: inputs.only-on-preview-comment == false || steps.check-comments.outputs.continue == 'true'
        uses: aws-actions/configure-aws-credentials@e5a46856c337d0634c74cd84bb78ed1986395a23 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}"

      - name: Get SPA Deployment Information
        if: inputs.only-on-preview-comment == false || steps.check-comments.outputs.continue == 'true'
        id: deployment-info
        uses: nsbno/platform-actions/.github/actions/deployment/get-spa-deployment-info@feat/preview-urls-spa
        with:
          service-name: ${{ inputs.service-name }}

      - name: Download build artifact
        if: inputs.only-on-preview-comment == false || steps.check-comments.outputs.continue == 'true'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ./dist

      - name: Deploy SPA to Preview Bucket
        if: inputs.only-on-preview-comment == false || steps.check-comments.outputs.continue == 'true'
        id: upload-spa
        uses: nsbno/platform-actions/.github/actions/deployment/preview-spa/upload-to-s3@feat/preview-urls-spa
        with:
          preview-bucket-name: ${{ steps.deployment-info.outputs.preview-bucket-name }}
          pr-number: ${{ inputs.git-event-number }}
          git-sha: ${{ inputs.git-sha }}
          service-name: ${{ inputs.service-name }}
          github-repository-name: ${{ inputs.git-repository }}

      - name: Comment Preview URL on PR
        if: inputs.only-on-preview-comment == false || steps.check-comments.outputs.continue == 'true'
        uses: nsbno/platform-actions/.github/actions/deployment/preview-spa/comment-preview-url@feat/preview-urls-spa
        with:
          preview-domain-name: ${{ steps.deployment-info.outputs.preview-domain-name }}
          pr-number: ${{ inputs.git-event-number }}
          git-sha: ${{ inputs.git-sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-repository: ${{ inputs.git-repository }}

