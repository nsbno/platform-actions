name: Preview cleanup
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        description: "Directory containing the project files."
        default: "."
      ecr-repository-name:
        required: false
        type: string
        description: "The ECR repository name (optional, for multiple ECS services in single Terraform config)"

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    name: Delete App Runner Service and Logs
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}"

      # Get the deployment information for the service. Need to deploy without preview once first for the bucket to be created.
      - name: Get Application Deployment Information
        id: deployment-info
        uses: nsbno/platform-actions/.github/actions/deployment/get-application-deployment-info@v2
        with:
          github-repository-name: ${{ github.repository }}
          working-directory: ${{ inputs.working-directory }}
          ecr-repository-name: ${{ inputs.ecr-repository-name }}

      - name: Delete App Runner Service
        id: delete-service
        shell: bash
        run: |
          SERVICE_NAME="pr-${{ github.event.number }}-${{ steps.deployment-info.outputs.ecs-service-name }}"
          echo "service-name=$SERVICE_NAME" >> $GITHUB_OUTPUT

          SERVICE_ARN=$(aws apprunner list-services --region ${{ vars.AWS_REGION }} \
            --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn" --output text)
          if [ -n "$SERVICE_ARN" ]; then
            aws apprunner delete-service --service-arn "$SERVICE_ARN" --region ${{ vars.AWS_REGION }}
            echo "Deleted App Runner service: $SERVICE_NAME"
          else
            echo "No App Runner service found for: $SERVICE_NAME"
          fi

      - name: Delete App Runner CloudWatch Logs
        uses: nsbno/platform-actions/.github/actions/helpers/cleanup/delete-cloudwatch-log-groups@v2
        with:
          log-group-prefix: "/aws/apprunner/${{ steps.delete-service.outputs.service-name }}"
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete ECS Express Service
        id: delete-ecs-express-service
        shell: bash
        run: |
          SERVICE_NAME="pr-${{ github.event.number }}-${{ steps.deployment-info.outputs.ecs-service-name }}"
          SERVICE_ARN="arn:aws:ecs:${{ vars.AWS_REGION }}:${{ vars.AWS_ACCOUNT_ID }}:service/default/${SERVICE_NAME}"
          echo "service-name=$SERVICE_NAME" >> $GITHUB_OUTPUT

          set +e
          DELETE_OUTPUT=$(aws ecs delete-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --region "${{ vars.AWS_REGION }}" 2>&1)
          DELETE_EXIT=$?
          set -e

          if [ $DELETE_EXIT -eq 0 ]; then
            echo "Deleted ECS Express service: $SERVICE_NAME"
          elif echo "$DELETE_OUTPUT" | grep -q -i "ServiceNotFoundException\|not found"; then
            echo "No ECS Express service found for: $SERVICE_NAME"
          else
            echo "Failed to delete ECS Express service: $DELETE_OUTPUT"
            exit 1
          fi

      - name: Delete ECS Express CloudWatch Logs
        uses: nsbno/platform-actions/.github/actions/helpers/cleanup/delete-cloudwatch-log-groups@v2
        with:
          # ECS Express log groups are named /aws/ecs/<cluster>/<service-name>-####
          log-group-prefix: "/aws/ecs/default/${{ steps.delete-ecs-express-service.outputs.service-name }}-"
          aws-region: ${{ vars.AWS_REGION }}
