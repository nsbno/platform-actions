name: Cleanup Stale SPA Previews
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name (must match Terraform module service_name)"
      days-to-keep:
        required: false
        type: number
        description: "Number of days to keep preview deployments. Default is 5 days."
        default: 5

permissions:
  contents: read
  id-token: write

jobs:
  cleanup-stale-previews:
    name: Delete Stale SPA Preview Deployments
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@e5a46856c337d0634c74cd84bb78ed1986395a23 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}"

      - name: Get preview bucket name
        id: get-config
        run: |
          PREVIEW_BUCKET=$(aws ssm get-parameter \
            --name "/__deployment__/applications/${{ inputs.service-name }}/preview-bucket-name" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          if [ -z "$PREVIEW_BUCKET" ] || [ "$PREVIEW_BUCKET" = "None" ]; then
            echo "::warning::Could not find preview bucket for service ${{ inputs.service-name }}. Preview infrastructure may not be deployed yet."
            echo "preview-bucket=" >> $GITHUB_OUTPUT
          else
            echo "preview-bucket=${PREVIEW_BUCKET}" >> $GITHUB_OUTPUT
          fi

      - name: Delete stale preview deployments
        if: steps.get-config.outputs.preview-bucket != ''
        run: |
          BUCKET="${{ steps.get-config.outputs.preview-bucket }}"
          CUTOFF_SECONDS=$(( ${{ inputs.days-to-keep }} * 24 * 60 * 60 ))
          CURRENT_TIME=$(date +%s)

          PR_PREFIXES=$(aws s3 ls "s3://${BUCKET}/" | grep 'PRE pr-' | awk '{print $2}' | sed 's/\///')

          if [ -z "$PR_PREFIXES" ]; then
            echo "No PR prefixes found in ${BUCKET}"
            exit 0
          fi

          for PREFIX in $PR_PREFIXES; do
            LAST_MODIFIED=$(aws s3api list-objects-v2 \
              --bucket "${BUCKET}" \
              --prefix "${PREFIX}/" \
              --query 'reverse(sort_by(Contents, &LastModified))[0].LastModified' \
              --output text 2>/dev/null)

            if [ -z "$LAST_MODIFIED" ] || [ "$LAST_MODIFIED" = "None" ]; then
              continue
            fi

            LAST_MODIFIED_SECS=$(date -d "$LAST_MODIFIED" +%s)
            AGE_SECS=$(( CURRENT_TIME - LAST_MODIFIED_SECS ))

            if [ $AGE_SECS -gt $CUTOFF_SECONDS ]; then
              echo "Deleting stale preview: ${PREFIX} (age: $((AGE_SECS / 86400)) days)"
              aws s3 rm "s3://${BUCKET}/${PREFIX}/" --recursive
            else
              echo "Keeping recent preview: ${PREFIX} (age: $((AGE_SECS / 86400)) days)"
            fi
          done

          echo "Cleanup completed"
