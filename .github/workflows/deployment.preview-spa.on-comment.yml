name: Deploy SPA preview on PR comment
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name (must match Terraform module)"
      working-directory:
        required: false
        type: string
        default: ""
        description: "Working directory for the service"
      artifact-path:
        required: false
        type: string
        default: "dist"
        description: "Path to build output directory"
      package-manager:
        required: false
        type: string
        default: "npm"
        description: "Package manager to use (npm or pnpm)"

permissions:
  contents: read
  pull-requests: write
  actions: write
  id-token: write

jobs:
  trigger-preview:
    name: Trigger Preview on .preview comment
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '.preview')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pr.outputs.ref }}
      sha: ${{ steps.pr.outputs.sha }}
      pr_number: ${{ steps.pr.outputs.number }}
      comment_id: ${{ github.event.comment.id }}
      initial_reaction_id: ${{ steps.react.outputs.reaction_id }}
    steps:
      - name: React to comment with eyes
        id: react
        uses: actions/github-script@v7
        with:
          script: |
            const reaction = await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            core.setOutput('reaction_id', reaction.data.id);

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('number', context.issue.number);

  build-and-deploy:
    needs: trigger-preview
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.trigger-preview.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory != '' && format('{0}/package-lock.json', inputs.working-directory) || 'package-lock.json' }}

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: ${{ inputs.package-manager }} ${{ inputs.package-manager == 'npm' && 'ci' || 'install' }}
        working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ inputs.package-manager }} run build
        working-directory: ${{ inputs.working-directory }}

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOYMENT_ROLE_NAME }}"

      - name: Deploy to preview S3 bucket
        uses: nsbno/platform-actions/.github/actions/deployment/static-files/spa-preview-to-s3@feat/preview-urls-spa
        with:
          s3-bucket-name: "${{ vars.AWS_ACCOUNT_ID }}-${{ inputs.service-name }}-preview-v2"
          git-sha: ${{ needs.trigger-preview.outputs.sha }}
          git-event-number: ${{ needs.trigger-preview.outputs.pr_number }}
          artifact-path: ${{ inputs.artifact-path }}
          working-directory: ${{ inputs.working-directory }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.trigger-preview.outputs.pr_number }};
            const serviceName = '${{ inputs.service-name }}';
            const previewUrl = `https://pr-${prNumber}.${serviceName}.test.infrademo.vydev.io`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `### Preview Deployment ✅\n\n🚀 Preview URL: ${previewUrl}`
            });

  update-comment-status:
    needs: [trigger-preview, build-and-deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Remove eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.deleteForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.trigger-preview.outputs.comment_id }},
              reaction_id: ${{ needs.trigger-preview.outputs.initial_reaction_id }}
            });

      - name: Add success reaction
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.trigger-preview.outputs.comment_id }},
              content: 'rocket'
            });

      - name: Add failure reaction
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.trigger-preview.outputs.comment_id }},
              content: '-1'
            });
