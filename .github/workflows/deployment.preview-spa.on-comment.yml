name: Deploy SPA preview on PR comment
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name (must match Terraform module)"
      working-directory:
        required: false
        type: string
        default: ""
        description: "Working directory for the service"

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  trigger-preview:
    name: Trigger SPA Preview on .preview comment
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '.preview')
    runs-on: ubuntu-latest
    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('number', context.issue.number);

      - name: Trigger workflow re-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              head_sha: '${{ steps.pr.outputs.sha }}',
              per_page: 1
            });
            
            if (runs.data.workflow_runs.length > 0) {
              const runId = runs.data.workflow_runs[0].id;
              
              await github.rest.actions.reRunWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId
              });
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🔄 Re-running workflow to deploy preview...'
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ No workflow run found for this PR. Push a commit to trigger the initial build.'
              });
            }
