name: Deploy SPA preview on PR comment
on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name (must match Terraform module)"
      working-directory:
        required: false
        type: string
        default: ""
        description: "Working directory for the service"
      artifact-path:
        required: false
        type: string
        default: "dist"
        description: "Path to build output directory"
      package-manager:
        required: false
        type: string
        default: "npm"
        description: "Package manager to use (npm or pnpm)"

permissions:
  contents: read
  pull-requests: write
  actions: write
  id-token: write

jobs:
  trigger-preview:
    name: Trigger Preview on .preview comment
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '.preview')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pr.outputs.ref }}
      sha: ${{ steps.pr.outputs.sha }}
      pr_number: ${{ steps.pr.outputs.number }}
      comment_id: ${{ github.event.comment.id }}
      initial_reaction_id: ${{ steps.react.outputs.reaction_id }}
    steps:
      - name: React to comment with eyes
        id: react
        uses: actions/github-script@v7
        with:
          script: |
            const reaction = await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            core.setOutput('reaction_id', reaction.data.id);

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('number', context.issue.number);

  build:
    needs: trigger-preview
    uses: nsbno/platform-actions/.github/workflows/build.node.yml@feat/preview-urls-spa
    secrets: inherit
    with:
      artifact-path: ${{ inputs.artifact-path }}
      working-directory: ${{ inputs.working-directory }}
      git-sha: ${{ needs.trigger-preview.outputs.sha }}
      package-manager: ${{ inputs.package-manager }}

  deploy-preview:
    needs:
      - trigger-preview
      - build
    uses: nsbno/platform-actions/.github/workflows/deployment.preview-spa.yml@feat/preview-urls-spa
    secrets: inherit
    with:
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      service-name: ${{ inputs.service-name }}
      working-directory: ${{ inputs.working-directory }}
      git-sha: ${{ needs.trigger-preview.outputs.sha }}
      git-event-number: ${{ needs.trigger-preview.outputs.pr_number }}
      only-on-preview-comment: false

  update-comment-status:
    needs: [trigger-preview, build, deploy-preview]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Remove eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.deleteForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.trigger-preview.outputs.comment_id }},
              reaction_id: ${{ needs.trigger-preview.outputs.initial_reaction_id }}
            });

      - name: Add success reaction
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.trigger-preview.outputs.comment_id }},
              content: 'rocket'
            });

      - name: Add failure reaction
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.trigger-preview.outputs.comment_id }},
              content: '-1'
            });
