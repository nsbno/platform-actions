##
# Use this tool to run "lint operations"
# on your terraform code, such as `terraform fmt` and `terraform validate`
##
name: Lint Terraform

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the project files"
        required: false
        type: string
        default: "."
      terraform-version:
        required: false
        type: string
        description: "What Terraform version to use"
      run-fmt:
        required: false
        type: boolean
        default: true
        description: "Set to false if you don't want to run `terraform fmt`. Defaults to true"
      run-validate:
        required: false
        type: boolean
        default: true
        description: "Set to false if you don't want to run `terraform validate`. Defaults to true"

jobs:
  fmt:
    if: ${{ inputs.run-fmt }}
    name: 'fmt (${{ inputs.working-directory }})'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Check formatting
        run: terraform fmt -check -diff -recursive

  validate:
    if: ${{ inputs.run-validate }}
    name: 'Validate (${{ inputs.working-directory }})'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate